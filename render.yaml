services:
  - type: web
    name: groweasy-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: npm_config_build_from_source
        value: true
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Enter your Google Gemini API key"
      - key: FRONTEND_URL
        sync: false
        placeholder: "Enter your Vercel frontend URL (e.g. https://your-app.vercel.app)"
