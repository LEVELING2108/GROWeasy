services:
  - type: web
    name: groweasy-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
        placeholder: "Enter your PostgreSQL connection string (e.g. from Supabase, Neon, or Render Postgres)"
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Enter your Google Gemini API key"
      - key: FRONTEND_URL
        sync: false
        placeholder: "Enter your Vercel frontend URL (e.g. https://your-app.vercel.app)"
